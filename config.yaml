# BJEA 校园导览机器人 —— 集中配置文件
# 所有可调参数在此一处管理。

tts:
  voice: "zh-CN-XiaoxiaoNeural"   # Edge-TTS 中文女声（微软晓晓）

asr:
  model: "base"
  silence_threshold: 500        # 静音判定阈值（幅度值）
  silence_duration: 2.5         # 触发停止的静音持续秒数
  sample_rate: 44100
  output_path: "cache/output.wav"

motor:
  drive_pin: 27                 # 驱动电机 PWM 引脚（BCM 编号）
  steer_pin: 17                 # 转向舵机 PWM 引脚（BCM 编号）
  pwm_freq: 50                  # PWM 频率（Hz）

sensors:
  encoder_ticks_per_meter: 20   # 编码器每米脉冲数（需在真车上标定）
  mpu6050_address: 0x68         # I2C 地址

resources:
  actions_file: "resources/demoActions.json"
  locations_file: "resources/locationKeywords.json"
  chat_intents_file: "resources/chatIntents.json"
  audio_dir: ""   # 已迁移至 Edge-TTS，不再使用预录音频

chat:
  match_threshold: 80           # 低于此分数触发 LLM 兜底
  score_gap: 10                 # 第一名与第二名差距小于此值视为模糊匹配

llm:
  # Qwen2.5-0.5B GGUF 量化模型 —— 开放式闲聊兜底
  model_path: "models/qwen2.5-0.5b-instruct-q4_k_m.gguf"
  max_tokens: 64
  temperature: 0.7
  n_ctx: 512

navigation:
  routes_file: "resources/routes.yaml"
