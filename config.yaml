# BJEA Campus Guide Robot — Configuration
# All tunable parameters in one place.

tts:
  model_path: "piper_models/zh_CN-huayan-medium.onnx"
  config_path: "piper_models/zh_CN-huayan-medium.onnx.json"

asr:
  model: "base"
  silence_threshold: 500
  silence_duration: 2.5
  sample_rate: 44100
  output_path: "cache/output.wav"

motor:
  drive_pin: 27
  steer_pin: 17
  pwm_freq: 50

sensors:
  encoder_ticks_per_meter: 20   # calibrate on actual hardware
  mpu6050_address: 0x68

resources:
  actions_file: "resources/demoActions.json"
  locations_file: "resources/locationKeywords.json"
  chat_intents_file: "resources/chatIntents.json"
  audio_dir: "resources/audio"

chat:
  # Confidence score below this triggers LLM fallback instead of "I don't understand"
  match_threshold: 80
  score_gap: 10

llm:
  # Qwen2.5-0.5B GGUF quantised model for open-ended chat fallback
  model_path: "models/qwen2.5-0.5b-instruct-q4_k_m.gguf"
  max_tokens: 64
  temperature: 0.7
  n_ctx: 512

navigation:
  routes_file: "resources/routes.yaml"
